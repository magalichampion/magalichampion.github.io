services:
  jekyll:
    image: amirpourmand/al-folio
    container_name: al-folio-website
    command: >
      bash -c "rm -f Gemfile.lock 
      && bundle config set --local path 'vendor/bundle'
      && bundle install 
      && bundle exec jekyll serve --watch --host=0.0.0.0 --port=4000 --force_polling"
    ports:
      - "4000:4000"
    environment:
      - PAGES_REPO_NWO=magalichampion/magalichampion.github.io
    volumes:
      - .:/srv/jekyll